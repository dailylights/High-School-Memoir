<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 高中回忆录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html">High School Memoir</a></div>
        <div class="nav-links">
            <a href="index.html" class="nav-item">首页</a>
            <a href="login.html" class="nav-item">登录</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="card">
            <div class="sidebar-title" style="text-align: center; border: none;">用户注册</div>
            <form id="register-form">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="name" required maxlength="50">
                </div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required minlength="3" maxlength="20">
                    <div class="form-hint">3-20个字符，只能包含字母、数字和下划线</div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required minlength="6" maxlength="50">
                    <div class="form-hint">密码长度6-50位</div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" name="confirm_password" required>
                </div>
                <div class="form-group">
                    <label>班级</label>
                    <input type="text" name="class" required maxlength="100" placeholder="例如：高三(1)班">
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" name="phone" required pattern="^1[3-9]\d{9}$" placeholder="用于找回密码">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">注册</button>
            </form>
            <div class="auth-links">
                <a href="login.html">已有账号？立即登录</a> | <a href="recover.html">找回密码</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
