<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 高中回忆录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html">High School Memoir</a></div>
        <div class="nav-links">
            <a href="index.html" class="nav-item">首页</a>
            <a href="login.html" class="nav-item">登录</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="card">
            <div class="sidebar-title" style="text-align: center; border: none;">用户注册</div>
            <form id="register-form">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="name" required placeholder="请输入真实姓名">
                </div>
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" name="username" required placeholder="请设置登录账号">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required placeholder="请设置密码（至少6位）">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" name="confirm_password" required placeholder="请再次输入密码">
                </div>
                <div class="form-group">
                    <label>班级</label>
                    <input type="text" name="class" required placeholder="例如：高三(1)班">
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" name="phone" required placeholder="用于找回密码">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">注册</button>
            </form>
            <div class="auth-links">
                <a href="login.html">已有账号？立即登录</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const password = form.password.value;
            const confirmPassword = form.confirm_password.value;
            
            if (password.length < 6) {
                alert('密码至少需要6位');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }
            
            const phone = form.phone.value;
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }
            
            const formData = new FormData(form);
            formData.delete('confirm_password');
            formData.append('action', 'register');
            
            try {
                const res = await fetch(API_BASE + 'auth.php', { method: 'POST', body: formData });
                const data = await res.json();
                alert(data.message);
                if (data.success) {
                    window.location.href = 'login.html';
                }
            } catch (err) {
                alert('注册失败，请稍后重试');
            }
        });
    </script>
</body>
</html>
