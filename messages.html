<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私信 - 高中回忆录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html">High School Memoir</a></div>
        <div class="nav-links" id="nav-auth">
            <a href="index.html" class="nav-item">首页</a>
            <a href="login.html" class="nav-item">登录</a>
            <a href="register.html" class="btn btn-primary">注册</a>
        </div>
    </nav>

    <div class="messages-container">
        <aside class="conversations-list">
            <div class="conversations-header">
                <h3>💬 私信</h3>
                <div class="conversation-search">
                    <input type="text" id="conversation-search-input" placeholder="搜索同学开始聊天...">
                    <div class="user-search-results" id="user-search-results" style="display: none;"></div>
                </div>
            </div>
            <div class="conversation-items" id="conversation-items">
                <div style="padding: 20px; text-align: center; color: #888;">加载中...</div>
            </div>
        </aside>

        <div class="chat-area" id="chat-area">
            <div class="empty-state" id="empty-chat-state">
                <div class="empty-state-icon">💌</div>
                <h3>选择一个对话开始聊天</h3>
                <p>在左侧选择一位同学，或者通过搜索找到老同学，开启你们的青春回忆之旅</p>
            </div>

            <div id="chat-content" style="display: none; flex-direction: column; flex: 1;">
                <div class="chat-header">
                    <div class="chat-user-info">
                        <div class="chat-user-avatar" id="chat-header-avatar"></div>
                        <div class="chat-user-details">
                            <h4 id="chat-header-name">加载中...</h4>
                            <span id="chat-header-class"></span>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="btn" onclick="loadConversationMessages(currentChatUserId, 1)" title="刷新">🔄</button>
                    </div>
                </div>

                <div class="messages-list" id="messages-list"></div>

                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <textarea id="message-input" placeholder="输入消息，按 Enter 发送，Shift+Enter 换行..." rows="1"></textarea>
                        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>📤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        let currentChatUserId = null;
        let messagesPollingInterval = null;
        let lastMessageId = 0;
        let isLoadingMessages = false;
        let searchTimeout = null;

        document.addEventListener('DOMContentLoaded', () => {
            checkSession().then(() => {
                if (!currentUser) {
                    window.location.href = 'login.html';
                    return;
                }
                loadConversations();
                setupMessageInput();
                setupSearch();
            });
        });

        function setupSearch() {
            const searchInput = document.getElementById('conversation-search-input');
            const resultsContainer = document.getElementById('user-search-results');

            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                const keyword = e.target.value.trim();

                if (keyword.length === 0) {
                    resultsContainer.style.display = 'none';
                    return;
                }

                searchTimeout = setTimeout(() => {
                    searchUsers(keyword);
                }, 300);
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.conversation-search')) {
                    resultsContainer.style.display = 'none';
                }
            });
        }

        async function searchUsers(keyword) {
            const resultsContainer = document.getElementById('user-search-results');
            try {
                const res = await fetch(`${API_BASE}messages.php?action=search_users&keyword=${encodeURIComponent(keyword)}`);
                const data = await res.json();

                if (data.success && data.users.length > 0) {
                    resultsContainer.innerHTML = '';
                    data.users.forEach(user => {
                        const div = document.createElement('div');
                        div.className = 'user-search-item';
                        div.onclick = () => startChatWithUser(user);
                        div.innerHTML = `
                            ${getAvatarHtml({name: user.name, avatar: user.avatar}, '36px', '1rem')}
                            <div class="user-search-info">
                                <div class="name">${escapeHtml(user.name)}</div>
                                <div class="meta">${escapeHtml(user.class)} · @${escapeHtml(user.username)}</div>
                            </div>
                        `;
                        resultsContainer.appendChild(div);
                    });
                    resultsContainer.style.display = 'block';
                } else {
                    resultsContainer.innerHTML = '<div style="padding: 15px; text-align: center; color: #999; font-size: 0.85rem;">未找到相关用户</div>';
                    resultsContainer.style.display = 'block';
                }
            } catch (e) {
                console.error('Search users failed', e);
            }
        }

        function startChatWithUser(user) {
            document.getElementById('user-search-results').style.display = 'none';
            document.getElementById('conversation-search-input').value = '';
            openChat(user.id, user.name, user.avatar, user.class);
        }

        function setupMessageInput() {
            const textarea = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');

            textarea.addEventListener('input', () => {
                textarea.style.height = 'auto';
                textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
                sendBtn.disabled = textarea.value.trim().length === 0;
            });

            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!sendBtn.disabled) {
                        sendMessage();
                    }
                }
            });
        }

        async function loadConversations() {
            const container = document.getElementById('conversation-items');
            try {
                const res = await fetch(`${API_BASE}messages.php?action=get_conversations`);
                const data = await res.json();

                if (data.success) {
                    if (data.conversations.length === 0) {
                        container.innerHTML = '<div class="no-conversations">还没有对话<br>搜索同学开始聊天吧</div>';
                        return;
                    }

                    container.innerHTML = '';
                    data.conversations.forEach(conv => {
                        const div = document.createElement('div');
                        div.className = 'conversation-item';
                        div.dataset.userId = conv.user_id;
                        div.onclick = () => openChat(conv.user_id, conv.user_name, conv.user_avatar, conv.user_class);

                        const unreadBadge = conv.unread_count > 0 
                            ? `<div class="unread-badge">${conv.unread_count > 99 ? '99+' : conv.unread_count}</div>` 
                            : '';

                        const preview = conv.last_message ? escapeHtml(conv.last_message.substring(0, 50)) + (conv.last_message.length > 50 ? '...' : '') : '开始聊天吧';

                        div.innerHTML = `
                            <div class="conversation-avatar">
                                ${getAvatarHtml({name: conv.user_name, avatar: conv.user_avatar}, '44px', '1.1rem')}
                            </div>
                            <div class="conversation-info">
                                <div class="conversation-name">
                                    <span>${escapeHtml(conv.user_name)}</span>
                                    <span class="conversation-time">${formatTime(conv.last_time)}</span>
                                </div>
                                <div class="conversation-preview">${preview}</div>
                            </div>
                            ${unreadBadge}
                        `;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<div style="padding: 20px; text-align: center; color: red;">加载失败</div>';
                }
            } catch (e) {
                console.error('Load conversations failed', e);
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: red;">加载错误</div>';
            }
        }

        function openChat(userId, userName, userAvatar, userClass) {
            currentChatUserId = userId;
            lastMessageId = 0;

            document.getElementById('empty-chat-state').style.display = 'none';
            document.getElementById('chat-content').style.display = 'flex';

            document.getElementById('chat-header-avatar').innerHTML = getAvatarHtml({name: userName, avatar: userAvatar}, '40px', '1rem');
            document.getElementById('chat-header-name').textContent = userName;
            document.getElementById('chat-header-class').textContent = userClass || '';

            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('active');
                if (parseInt(item.dataset.userId) === userId) {
                    item.classList.add('active');
                    const badge = item.querySelector('.unread-badge');
                    if (badge) badge.remove();
                }
            });

            const sendBtn = document.getElementById('send-btn');
            const textarea = document.getElementById('message-input');
            sendBtn.disabled = textarea.value.trim().length === 0;

            loadConversationMessages(userId, 1);
            startPolling(userId);
        }

        async function loadConversationMessages(userId, page = 1) {
            if (isLoadingMessages) return;
            isLoadingMessages = true;

            const messagesList = document.getElementById('messages-list');
            if (page === 1) {
                messagesList.innerHTML = '<div style="text-align: center; padding: 20px; color: #888;">加载中...</div>';
            }

            try {
                const res = await fetch(`${API_BASE}messages.php?action=get_messages&user_id=${userId}&page=${page}&limit=20`);
                const data = await res.json();

                if (data.success) {
                    if (page === 1) {
                        messagesList.innerHTML = '';
                    }

                    const prevScrollHeight = messagesList.scrollHeight;

                    if (page > 1) {
                        const tempContainer = document.createElement('div');
                        data.messages.forEach(msg => {
                            tempContainer.appendChild(createMessageElement(msg));
                        });
                        const dateDivider = createDateDivider(data.messages[0]?.created_at);
                        messagesList.insertBefore(dateDivider, messagesList.firstChild);
                        while (tempContainer.firstChild) {
                            messagesList.insertBefore(tempContainer.lastChild, messagesList.firstChild);
                        }
                        messagesList.scrollTop = messagesList.scrollHeight - prevScrollHeight;
                    } else {
                        let lastDate = null;
                        data.messages.forEach(msg => {
                            const msgDate = new Date(msg.created_at).toDateString();
                            if (msgDate !== lastDate) {
                                messagesList.appendChild(createDateDivider(msg.created_at));
                                lastDate = msgDate;
                            }
                            messagesList.appendChild(createMessageElement(msg));
                        });
                        messagesList.scrollTop = messagesList.scrollHeight;
                    }

                    if (data.messages.length > 0) {
                        const lastMsg = data.messages[data.messages.length - 1];
                        lastMessageId = Math.max(lastMessageId, lastMsg.id);
                    }
                }
            } catch (e) {
                console.error('Load messages failed', e);
                if (page === 1) {
                    messagesList.innerHTML = '<div style="text-align: center; padding: 20px; color: red;">加载失败</div>';
                }
            }

            isLoadingMessages = false;
        }

        function createDateDivider(timestamp) {
            const div = document.createElement('div');
            div.className = 'message-date-divider';
            const date = new Date(timestamp);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            let dateStr;
            if (date.toDateString() === today.toDateString()) {
                dateStr = '今天';
            } else if (date.toDateString() === yesterday.toDateString()) {
                dateStr = '昨天';
            } else {
                dateStr = date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
            }

            div.innerHTML = `<span>${dateStr}</span>`;
            return div;
        }

        function createMessageElement(msg) {
            const isSent = msg.sender_id == currentUser.id;
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
            wrapper.dataset.messageId = msg.id;

            const otherUser = isSent ? null : { name: document.getElementById('chat-header-name')?.textContent || '', avatar: null };

            wrapper.innerHTML = `
                <div class="message-avatar">
                    ${isSent ? getAvatarHtml(currentUser, '32px', '0.85rem') : getAvatarHtml(otherUser || {name: '?'}, '32px', '0.85rem')}
                </div>
                <div class="message-bubble">
                    <div class="message-text">${formatMessageContent(msg.content)}</div>
                    <div class="message-time">${formatMessageTime(msg.created_at)}${isSent ? ' <span class="message-status">✓</span>' : ''}</div>
                </div>
            `;

            return wrapper;
        }

        function formatMessageContent(content) {
            return escapeHtml(content).replace(/\n/g, '<br>');
        }

        function formatMessageTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            if (diff < 604800000) {
                const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                return days[date.getDay()];
            }
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const textarea = document.getElementById('message-input');
            const content = textarea.value.trim();

            if (!content || !currentChatUserId) return;

            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('action', 'send');
                formData.append('receiver_id', currentChatUserId);
                formData.append('content', content);

                const res = await fetch(`${API_BASE}messages.php`, { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    textarea.value = '';
                    textarea.style.height = 'auto';
                    sendBtn.disabled = true;

                    appendNewMessage({
                        id: data.message_id,
                        sender_id: currentUser.id,
                        receiver_id: currentChatUserId,
                        content: content,
                        created_at: new Date().toISOString(),
                        is_read: 0
                    });

                    loadConversations();
                } else {
                    alert(data.message || '发送失败');
                    sendBtn.disabled = false;
                }
            } catch (e) {
                console.error('Send message failed', e);
                alert('发送失败，请稍后重试');
                sendBtn.disabled = false;
            }
        }

        function appendNewMessage(msg) {
            const messagesList = document.getElementById('messages-list');
            const msgElement = createMessageElement(msg);
            
            const lastDateDivider = messagesList.querySelector('.message-date-divider:last-of-type');
            const today = new Date().toDateString();
            const msgDate = new Date(msg.created_at).toDateString();

            if (!lastDateDivider || msgDate !== today) {
                messagesList.appendChild(createDateDivider(msg.created_at));
            }

            messagesList.appendChild(msgElement);
            messagesList.scrollTop = messagesList.scrollHeight;
            lastMessageId = Math.max(lastMessageId, msg.id);
        }

        function startPolling(userId) {
            if (messagesPollingInterval) {
                clearInterval(messagesPollingInterval);
            }

            messagesPollingInterval = setInterval(() => {
                if (currentChatUserId === userId) {
                    checkNewMessages(userId);
                }
            }, 3000);
        }

        async function checkNewMessages(userId) {
            try {
                const res = await fetch(`${API_BASE}messages.php?action=get_messages&user_id=${userId}&page=1&limit=20`);
                const data = await res.json();

                if (data.success && data.messages.length > 0) {
                    const messagesList = document.getElementById('messages-list');
                    const existingIds = new Set();
                    messagesList.querySelectorAll('.message-wrapper').forEach(el => {
                        existingIds.add(parseInt(el.dataset.messageId));
                    });

                    let hasNew = false;
                    data.messages.forEach(msg => {
                        if (!existingIds.has(msg.id) && msg.sender_id !== currentUser.id) {
                            appendNewMessage(msg);
                            hasNew = true;
                        }
                    });

                    if (hasNew) {
                        loadConversations();
                    }
                }
            } catch (e) {
                console.error('Polling failed', e);
            }
        }

        window.addEventListener('beforeunload', () => {
            if (messagesPollingInterval) {
                clearInterval(messagesPollingInterval);
            }
        });
    </script>
</body>
</html>
